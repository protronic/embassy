# Build libgraphics4d_rp2350.a and commit vendor/graphics4d-rp2350/.
#
# Operate from cloud agent / CLI:
#   ./scripts/operate-graphics4d-worker.sh local --push     # build on current VM
#   ./scripts/operate-graphics4d-worker.sh remote --wait    # after merge to main
#
# Requires repo secret GRAPHICS4D_PICO_TOKEN (PAT read access to Graphics4D-pico).

name: Vendor Graphics4D lib

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: Branch to update with the vendored .a
        required: true
        default: cursor/gen4-rp2350-70ct-clb-36d2
      push_commit:
        description: Commit and push vendored lib to the branch
        type: boolean
        default: true
      runner_type:
        description: cloud = GitHub-hosted Ubuntu; self-hosted = your machine with label graphics4d
        type: choice
        options:
          - cloud
          - self-hosted
        default: cloud

permissions:
  contents: write

jobs:
  vendor-cloud:
    if: inputs.runner_type == 'cloud'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}
          fetch-depth: 0

      - name: Install build dependencies
        working-directory: examples/gen4-rp2350-70ct-clb
        run: |
          chmod +x scripts/*.sh
          ./scripts/ci-install-graphics4d-deps.sh
          echo "PICO_SDK_PATH=${PICO_SDK_PATH}" >> "$GITHUB_ENV"

      - name: Install Rust target
        run: rustup target add thumbv8m.main-none-eabihf

      - name: Build and vendor libgraphics4d_rp2350.a
        working-directory: examples/gen4-rp2350-70ct-clb
        env:
          GRAPHICS4D_PICO_TOKEN: ${{ secrets.GRAPHICS4D_PICO_TOKEN }}
          PUSH: ${{ inputs.push_commit && '1' || '0' }}
          TARGET_BRANCH: ${{ inputs.target_branch }}
        run: ./scripts/graphics4d-worker-build.sh

      - name: Upload vendored archive
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: graphics4d-rp2350-${{ github.run_id }}
          path: |
            examples/gen4-rp2350-70ct-clb/vendor/graphics4d-rp2350/lib/libgraphics4d_rp2350.a
            examples/gen4-rp2350-70ct-clb/vendor/graphics4d-rp2350/include/
          if-no-files-found: warn
          retention-days: 30

  vendor-self-hosted:
    if: inputs.runner_type == 'self-hosted'
    runs-on: [self-hosted, graphics4d]
    timeout-minutes: 60
    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}
          fetch-depth: 0

      - name: Build and vendor libgraphics4d_rp2350.a
        working-directory: examples/gen4-rp2350-70ct-clb
        env:
          PICO_SDK_PATH: ${{ vars.PICO_SDK_PATH }}
          GEN4_GRAPHICS4D_SDK: ${{ vars.GEN4_GRAPHICS4D_SDK }}
          GRAPHICS4D_PICO_TOKEN: ${{ secrets.GRAPHICS4D_PICO_TOKEN }}
          PUSH: ${{ inputs.push_commit && '1' || '0' }}
          TARGET_BRANCH: ${{ inputs.target_branch }}
        run: |
          chmod +x scripts/*.sh
          ./scripts/graphics4d-worker-build.sh

      - name: Upload vendored archive
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: graphics4d-rp2350-${{ github.run_id }}
          path: |
            examples/gen4-rp2350-70ct-clb/vendor/graphics4d-rp2350/lib/libgraphics4d_rp2350.a
            examples/gen4-rp2350-70ct-clb/vendor/graphics4d-rp2350/include/
          if-no-files-found: warn
          retention-days: 30
